<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Left & Right</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e6f2ff;
            font-family: -apple-system, sans-serif;
        }
        .player-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 2rem;
            font-size: 2rem;
            font-family: 'STKaiti', 'KaiTi', 'SimSun', serif;
            letter-spacing: 2px;
            font-weight: 500;
        }
        audio {
            width: 100%;
            border-radius: 12px;
        }
        .subtitle {
            margin-top: 1.5rem;
            color: #666;
            font-size: 0.95rem;
            font-family: 'STKaiti', 'KaiTi', serif;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <h1>Left Day 20</h1>
        <audio controls>
            <source src="Left%20Day%2020.m4a" type="audio/mp4">
            你的浏览器不支持音频播放，请直接复制链接到播放器打开。
        
        <p class="subtitle">致左航 · 20岁生日快乐</p>
    </div>
</body>
</html>
