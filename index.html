<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Left-Right</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e0f0ff;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .player-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }
        audio {
            width: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <h1>Left-Day-20</h1>
        <audio controls autoplay>
            <source src="Left%20Day%2020.m4a" type="audio/mp4">
        
    </div>
</body>
</html>
